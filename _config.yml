# Footer
_footer:
  headline: "Built with ❤️ by [Ankur Taxali](https://github.com/ataxali) | [Star on GitHub](https://github.com/ataxali/poser)"

# Multi-page configuration
_page:
  # Documentation Page
  - _name: "Documentation"
    _title: "Poser Documentation"
    _footer:
      headline: "Need help? Check the [Usage Guide](https://github.com/ataxali/poser/blob/main/USAGE.md)"
    
    installation:
      - "Clone the repository: `git clone https://github.com/ataxali/poser.git`"
      - "Navigate to directory: `cd poser`"
      - "Create virtual environment: `python3 -m venv venv`"
      - "Activate environment: `source venv/bin/activate` (Linux/Mac) or `venv\\Scripts\\activate` (Windows)"
      - "Install package: `pip install -e .`"
      - "Set up API key: `export OPENAI_API_KEY='your-api-key-here'`"
    
    basic_usage:
      - "Check profile status: `poser`"
      - "Generate text: `poser 'write a slack message about my new app deployment'`"
      - "Add writing sample: `poser add-sample 'slack update' 'Hey team, quick update...'`"
      - "List samples: `poser list-samples`"
      - "Remove sample: `poser remove-sample sample_20250911_185212`"
      - "Backup profile: `poser --backup`"
    
    how_it_works:
      - "**Add Writing Samples**: Provide examples of your writing style"
      - "**AI Analysis**: Poser analyzes each sample to understand your patterns"
      - "**Smart Matching**: When requesting text, it finds relevant samples"
      - "**Style Generation**: Generates new text that matches your authentic voice"
    
    example_output:
      - "**Request**: `'write a slack message about my new app deployment'`"
      - "**Generated**:"
      - "```"
      - "hey team,"
      - ""
      - "just a heads up that we've deployed the new version of the app! 🎉"
      - "the commit hash is `b8f3e2c1d7a9c4e8a1c9e0f1b2c3d4e5f6a7890b`,"
      - "and it includes a bunch of tweaks we talked about in the last sprint."
      - ""
      - "i've tested the main features in staging, and everything seems to be"
      - "functioning as expected. however, i did notice a slight delay in some"
      - "API responses—might be worth keeping an eye on."
      - ""
      - "let me know if you encounter any issues or if something feels off."
      - "happy testing!"
      - "```"
    
    requirements:
      - "Python 3.8 or higher"
      - "OpenAI API key"
      - "Writing samples to train the system"

  # Examples Page
  - _name: "Examples"
    _title: "Poser Examples & Use Cases"
    _footer:
      headline: "See more examples in the [README](https://github.com/ataxali/poser/blob/main/README.md)"
    
    use_cases:
      - "**Slack Messages**: Quick team updates and announcements"
      - "**Email Communication**: Professional emails to colleagues and clients"
      - "**Social Media**: Posts that match your personal brand"
      - "**Documentation**: Technical writing in your style"
      - "**Meeting Notes**: Summaries and follow-up messages"
      - "**Customer Support**: Responses that sound like you"
    
    sample_requests:
      - "`poser 'write a slack message about my new app deployment'`"
      - "`poser 'email my boss about project delays'`"
      - "`poser 'write a LinkedIn post about my latest project'`"
      - "`poser 'draft a thank you email to a client'`"
      - "`poser 'write a status update for our team meeting'`"
    
    writing_samples:
      - "**Slack Updates**: Include examples of your team communication style"
      - "**Email Templates**: Professional and casual email examples"
      - "**Social Posts**: Samples of your social media voice"
      - "**Technical Writing**: Documentation or code comments"
      - "**Personal Notes**: Informal communication examples"
    
    best_practices:
      - "Provide diverse writing samples across different contexts"
      - "Include examples that match your target use cases"
      - "Regularly add new samples to improve accuracy"
      - "Use descriptive tags when adding samples"
      - "Backup your profile regularly"

