# Poser - AI Writing Assistant
site_name: "Poser"
_theme: "dark"
_title: "Poser - Your AI Writing Assistant That Actually Sounds Like You"

# Key features
features:
  - "Personal style analysis from writing samples"
  - "Context-aware text generation"
  - "Command-line interface for easy usage"
  - "OpenAI GPT integration"
  - "Sample management and backup system"
  - "Cross-platform Python support"

# Quick start commands
quick_start:
  - "Install: `pip install -e .`"
  - "Setup: `export OPENAI_API_KEY='your-key'`"
  - "Check status: `poser`"
  - "Generate text: `poser 'write a slack message about my app'`"

# Project cards
_card:
  - name: "GitHub Repository"
    description: "Source code, issues, and contributions"
    url: "https://github.com/ataxali/poser"
    status: "active"
  - name: "Documentation"
    description: "Complete usage guide and examples"
